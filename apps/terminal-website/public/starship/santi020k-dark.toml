"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
palette = "santi020k"
format = """
[ŅéČ](os)$os$username[Ņé░](fg:os bg:directory)$directory[Ņé░](fg:directory bg:git)$git_branch$git_status[Ņé░](fg:git bg:runtime)$c\
$cpp\
$deno\
$golang\
$java\
$nodejs\
$php\
$python\
$ruby\
$rust\
[Ņé░](fg:runtime bg:time)$docker_context$cmd_duration$time[Ņé┤](fg:time)$line_break$character"""

[palettes.santi020k]
os = "#602cba"
directory = "#752df0"
git = "#945df4"
runtime = "#89b8c8"
time = "#302545"
light_text = "#ffffff"
dark_text = "#17141d"
error = "#ea6962"

[os]
disabled = false
style = "bg:os fg:light_text"
format = "[  $symbol  ]($style)"

[os.symbols]
Macos = "’ģ╣"
Linux = "’ģ╝"
Windows = "¾░Ź▓"

[username]
show_always = false
style_user = "bg:os fg:light_text"
style_root = "bg:os fg:light_text bold"
format = "[$user ]($style)"

[directory]
style = "bg:directory fg:light_text bold"
format = "[  $path  ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "’Ćü "
"Pictures" = "’ĆŠ "

[git_branch]
symbol = "’Éś"
style = "bg:git fg:dark_text bold"
format = "[  $symbol $branch ]($style)"

[git_status]
style = "bg:git fg:dark_text"
format = "[$all_status$ahead_behind  ]($style)"

[character]
success_symbol = "[ŌØ»](bold directory)"
error_symbol = "[ŌØ»](bold error)"

[cmd_duration]
min_time = 2000
style = "bg:time fg:light_text"
format = "[ ¾░ö¤ $duration ]($style)"

[time]
