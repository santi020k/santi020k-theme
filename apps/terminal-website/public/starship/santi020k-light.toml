"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
palette = "santi020k"
format = """
[¯éÂ](os)$os$username[¯é░](fg:os bg:directory)$directory[¯é░](fg:directory bg:git)$git_branch$git_status[¯é░](fg:git bg:runtime)$c\
$cpp\
$deno\
$golang\
$java\
$nodejs\
$php\
$python\
$ruby\
$rust\
[¯é░](fg:runtime bg:time)$docker_context$cmd_duration$time[¯é┤](fg:time)$line_break$character"""

[palettes.santi020k]
os = "#5a14b0"
directory = "#6319be"
git = "#9451cf"
runtime = "#a8d6e5"
time = "#ddd8f0"
light_text = "#ffffff"
dark_text = "#17141d"
error = "#c0392b"

[os]
disabled = false
style = "bg:os fg:light_text"
format = "[  $symbol  ]($style)"

[os.symbols]
Macos = "´à╣"
Linux = "´à╝"
Windows = "¾░ı▓"

[username]
show_always = false
style_user = "bg:os fg:light_text"
style_root = "bg:os fg:light_text bold"
format = "[$user ]($style)"

[env_var.SSH_CONNECTION]
variable = "SSH_CONNECTION"
symbol = "ssh "
style = "bg:os fg:light_text bold"
format = "[ $symbol]($style)"

[directory]
style = "bg:directory fg:light_text bold"
format = "[  $path  ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[git_branch]
symbol = "´Éİ"
style = "bg:git fg:dark_text bold"
format = "[  $symbol $branch ]($style)"

[git_status]
style = "bg:git fg:dark_text"
format = "[$all_status$ahead_behind  ]($style)"

[character]
success_symbol = "[ÔØ»](bold directory)"
error_symbol = "[ÔØ»](bold error)"

[cmd_duration]
disabled = false
min_time = 2000
style = "bg:time fg:dark_text"
format = "[ ¾░öş $duration ]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:time fg:dark_text"
format = "[  $time  ]($style)"

[docker_context]
disabled = false
symbol = "´îê "
style = "bg:time fg:dark_text"
format = "[ $symbol$context ]($style)"

[c]
disabled = false
style = "bg:runtime fg:dark_text"
format = "[  $symbol($version)  ]($style)"

[cpp]
disabled = false
style = "bg:runtime fg:dark_text"
format = "[  $symbol($version)  ]($style)"

[deno]
