name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate theme and website
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Zsh
        run: sudo apt-get update && sudo apt-get install --yes zsh

      - name: Validate
        run: pnpm run validate

      - name: Upload packaged extension
        uses: actions/upload-artifact@v7
        with:
          name: santi020k-theme-vsix
          path: packages/santi020k-theme/*.vsix
          if-no-files-found: error
          retention-days: 7
