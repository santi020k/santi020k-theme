name: Astro Doctor

on:
  pull_request:
    paths:
      - "apps/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/astro-doctor.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: astro-doctor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  astro-doctor:
    name: Scan Astro sites
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3

      - name: Run Astro Doctor
        uses: santi020k/astro-doctor@v1
        with:
          working-directory: .
          fail-on: error
          comment: true
          diff-only: true
