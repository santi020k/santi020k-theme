name: Changeset Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

jobs:
  changeset:
    name: Require changeset
    runs-on: ubuntu-latest
    if: >-
      ${{
        !contains(github.event.pull_request.labels.*.name, 'skip-changelog') &&
        !startsWith(github.event.pull_request.title, 'chore(release): version package')
      }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Assert changeset present
        run: npx changeset status --since=origin/main
