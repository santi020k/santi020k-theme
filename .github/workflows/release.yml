name: Release

on:
  push:
    branches:
      - main
    paths:
      - '.changeset/**'
      - 'package.json'
      - 'packages/theme/**'
      - 'packages/theme-core/**'
      - 'packages/santi020k-theme/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/publish-npm-packages.mjs'
      - 'apps/vscode-website/scripts/sync-website-version.mjs'
      - 'packages/santi020k-theme/scripts/ensure-release-tag.mjs'
      - 'packages/santi020k-theme/scripts/publish-registries.mjs'
      - '.github/workflows/release.yml'
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Create release PR or publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release pull request or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: "chore(release): version package"
          title: "chore(release): version package"
          createGithubReleases: true
        env:
          HUSKY: 0
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Ensure GitHub release tag exists
        if: github.ref == 'refs/heads/main' && steps.changesets.outputs.published == 'true'
        run: pnpm run release:tag
