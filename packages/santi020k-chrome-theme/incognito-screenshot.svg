<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="800" fill="#110c1d"/>
  
  <!-- Browser Frame / Tab strip area -->
  <rect width="1280" height="46" fill="#08060e"/>
  
  <!-- Active Tab -->
  <path d="M12,46 L12,14 Q12,6 20,6 L212,6 Q220,6 220,14 L220,46 Z" fill="#1c1528"/>
  <rect x="12" y="6" width="208" height="3" fill="#752df0" rx="1.5"/>
  <text x="116" y="30" font-family="Montserrat, sans-serif" font-size="13" fill="#dfdde3" text-anchor="middle">New Incognito Tab</text>
  
  <!-- Inactive Tab -->
  <path d="M222,46 L222,14 Q222,6 230,6 L422,6 Q430,6 430,14 L430,46 Z" fill="#08060e"/>
  <text x="326" y="30" font-family="Montserrat, sans-serif" font-size="13" fill="#9880c0" text-anchor="middle">GitHub</text>
  
  <!-- Toolbar -->
  <rect y="46" width="1280" height="46" fill="#1c1528"/>
  <rect x="80" y="52" width="1120" height="34" rx="17" fill="#08060e"/>
  <text x="96" y="74" font-family="Montserrat, sans-serif" font-size="13" fill="#b6b2bd">Search Google or type a URL</text>
  
  <!-- Bookmarks Bar -->
  <rect y="92" width="1280" height="32" fill="#1c1528"/>
  <line x1="0" y1="92" x2="1280" y2="92" stroke="#1a1523" stroke-width="1"/>
  <text x="16" y="113" font-family="Montserrat, sans-serif" font-size="12" fill="#dfdde3">★ Santi020k Theme</text>
  <text x="160" y="113" font-family="Montserrat, sans-serif" font-size="12" fill="#dfdde3">★ VS Code Extension</text>
  
  <!-- Content -->
  <g transform="translate(640, 440)">
    <!-- Incognito Icon -->
    <path d="M0,-110 C-33,-110 -60,-83 -60,-50 C-60,-17 -33,10 0,10 C33,10 60,-17 60,-50 C60,-83 33,-110 0,-110 Z M0,-100 C27,-100 50,-77 50,-50 C50,-23 27,0 0,0 C-27,0 -50,-23 -50,-50 C-50,-77 -27,-100 0,-100 Z M0,-85 C-8,-85 -15,-78 -15,-70 C-15,-62 -8,-55 0,-55 C8,-55 15,-62 15,-70 C15,-78 8,-85 0,-85 Z M0,-75 C2,-75 5,-72 5,-70 C5,-68 2,-65 0,-65 C-2,-65 -5,-68 -5,-70 C-5,-72 -2,-75 0,-75 Z M-22,-40 C-26,-40 -30,-36 -30,-32 C-30,-28 -26,-24 -22,-24 C-18,-24 -14,-28 -14,-32 C-14,-36 -18,-40 -22,-40 Z M22,-40 C18,-40 14,-36 14,-32 C14,-28 18,-24 22,-24 C26,-24 30,-28 30,-32 C30,-36 26,-40 22,-40 Z M-22,-35 C-20,-35 -19,-33 -19,-32 C-19,-31 -20,-29 -22,-29 C-24,-29 -25,-31 -25,-32 C-25,-33 -24,-35 -22,-35 Z M22,-35 C24,-35 25,-33 25,-32 C25,-31 24,-29 22,-29 C20,-29 19,-31 19,-32 C19,-33 20,-35 22,-35 Z M-30,-15 L30,-15 L30,-20 L-30,-20 Z" fill="#dfdde3"/>
    
    <text y="50" font-family="Montserrat, sans-serif" font-size="42" font-weight="700" fill="#dfdde3" text-anchor="middle">You’ve gone incognito</text>
    
    <text y="100" font-family="Montserrat, sans-serif" font-size="18" fill="#b6b2bd" text-anchor="middle">Now you can browse privately, and other people who use this device won’t see</text>
    <text y="125" font-family="Montserrat, sans-serif" font-size="18" fill="#b6b2bd" text-anchor="middle">your activity. However, downloads, bookmarks and reading list items will be saved.</text>
  </g>
</svg>
