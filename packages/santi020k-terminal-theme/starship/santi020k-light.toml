"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
palette = "santi020k"
format = """
[](os)$os$username[](fg:os bg:directory)$directory[](fg:directory bg:git)$git_branch$git_status[](fg:git bg:runtime)$c$cpp$deno$golang$java$nodejs$php$python$ruby$rust[](fg:runtime bg:time)$docker_context$cmd_duration$time[](fg:time)$line_break$character"""

[palettes.santi020k]
os = "#5a14b0"
directory = "#6319be"
git = "#9451cf"
runtime = "#a8d6e5"
time = "#ddd8f0"
light_text = "#ffffff"
dark_text = "#17141d"
error = "#c0392b"

[os]
disabled = false
style = "bg:os fg:light_text"
format = "[ $symbol ]($style)"

[os.symbols]
Macos = ""
Linux = ""
Windows = "󰍲"

[username]
show_always = false
style_user = "bg:os fg:light_text"
style_root = "bg:os fg:light_text bold"
format = "[$user ]($style)"

[directory]
style = "bg:directory fg:light_text bold"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:git fg:dark_text bold"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:git fg:dark_text"
format = "[$all_status$ahead_behind ]($style)"

[character]
success_symbol = "[❯](bold directory)"
error_symbol = "[❯](bold error)"

[cmd_duration]
min_time = 2000
style = "bg:time fg:dark_text"
format = "[ 󰔟 $duration ]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:time fg:dark_text"
format = "[  $time ]($style)"

[docker_context]
symbol = " "
style = "bg:time fg:dark_text"
format = "[ $symbol$context ]($style)"

[c]
style = "bg:runtime fg:dark_text"
format = "[ $symbol($version) ]($style)"

[cpp]
style = "bg:runtime fg:dark_text"
format = "[ $symbol($version) ]($style)"

[deno]
style = "bg:runtime fg:dark_text"
format = "[ $symbol($version) ]($style)"

[golang]
style = "bg:runtime fg:dark_text"
format = "[ $symbol($version) ]($style)"

[java]
style = "bg:runtime fg:dark_text"
format = "[ $symbol($version) ]($style)"

[nodejs]
style = "bg:runtime fg:dark_text"
format = "[ $symbol($version) ]($style)"

[php]
style = "bg:runtime fg:dark_text"
format = "[ $symbol($version) ]($style)"

[python]
style = "bg:runtime fg:dark_text"
format = "[ $symbol($version) ]($style)"

[ruby]
style = "bg:runtime fg:dark_text"
format = "[ $symbol($version) ]($style)"

[rust]
style = "bg:runtime fg:dark_text"
format = "[ $symbol($version) ]($style)"
