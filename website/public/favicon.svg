<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#211038" />
      <stop offset="50%" stop-color="#120c1e" />
      <stop offset="100%" stop-color="#08040d" />
    </linearGradient>

    <!-- Top Segment Gradient -->
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2c2ff" />
      <stop offset="100%" stop-color="#8b52d6" />
    </linearGradient>
    
    <!-- Bottom Segment Gradient -->
    <linearGradient id="g2" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f0e0ff" />
      <stop offset="100%" stop-color="#6930b8" />
    </linearGradient>

    <!-- Outer Glow & Drop Shadow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.8" />
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#8b52d6" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Base -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  
  <!-- Subtle Border -->
  <rect width="508" height="508" x="2" y="2" rx="110" fill="none" stroke="#33214d" stroke-width="4" />

  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- Bottom Segment of 'S' -->
    <path d="M -30 0 
             L 40 0 
             A 100 100 0 0 1 40 200 
             L -100 200" 
          fill="none" stroke="url(#g2)" stroke-width="68" stroke-linecap="round" />
          
    <!-- Top Segment of 'S' (overlaps bottom) -->
    <path d="M 100 -200 
             L -40 -200 
             A 100 100 0 0 0 -40 0 
             L 30 0" 
          fill="none" stroke="url(#g1)" stroke-width="68" stroke-linecap="round" />
  </g>
  
  <!-- Inner Highlights to give a 3D bevel look -->
  <g transform="translate(256, 256)">
    <!-- Bottom Segment Highlight -->
    <path d="M -30 0 
             L 40 0 
             A 100 100 0 0 1 40 200 
             L -100 200" 
          fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.15" transform="translate(0, -4)" />
          
    <!-- Top Segment Highlight -->
    <path d="M 100 -200 
             L -40 -200 
             A 100 100 0 0 0 -40 0 
             L 30 0" 
          fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.3" transform="translate(0, -4)" />
  </g>
</svg>
