packages:
  - "packages/*"
  - "apps/*"

ignoredBuiltDependencies:
  - '@vscode/vsce-sign'
  - esbuild
  - keytar
  - unrs-resolver

catalog:
  "@changesets/changelog-github": ^0.7.0
  "@changesets/cli": ^2.31.0
  "@commitlint/cli": ^21.2.1
  "@commitlint/config-conventional": ^21.2.0
  "@santi020k/eslint-config-basic": ^2.1.1
  "@types/node": ^26.1.1
  "@vscode/vsce": ^3.9.2
  astro: ^7.0.7
  archiver: ^8.0.0
  commitizen: ^4.3.2
  cspell: ^10.0.1
  cz-conventional-changelog: ^3.3.0
  eslint: ^10.7.0
  husky: ^9.1.7
  knip: ^6.26.0
  lint-staged: ^17.0.8
  ovsx: ^1.0.2
  sharp: ^0.35.3
  smol-toml: ^1.7.0
  turbo: ^2.10.4
  vite: ^8.1.4
  vitest: ^4.1.10
  wrangler: ^4.110.0

peerDependencyRules:
  allowedVersions:
    eslint: "10"

overrides:
  fast-uri: ^4.1.0
  read-yaml-file: ^3.0.0
  undici: ^8.7.0
  vite: ^8.1.4

allowBuilds:
